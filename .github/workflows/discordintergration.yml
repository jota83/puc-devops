name: Discord Notification

on:
  push:
    branches: ["main"]

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"🚀 Push detectado na main\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}