name: Discord Notification

on:
  workflow_run:
    workflows: ["Deploy"]
    types:
      - completed

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"Deploy finalizado: ${{ github.event.workflow_run.conclusion }}\"}" \
          ${{ secrets.YOUR_DISCORD_WEBHOOK_URL }}