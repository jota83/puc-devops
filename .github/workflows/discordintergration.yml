name: Discord Notification

on:
  workflow_run:
    workflows: ["Continuous Delivery"]
    types:
      - completed

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        uses: Snidll/discord-commits@v1.6
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          template: "avatar-with-link"
          include-extras: true