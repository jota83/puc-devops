name: Continuous Delivery

on:
  push:
    branches: [ "main" ]

jobs:
  cd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: 📦 Salvar artefato
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist